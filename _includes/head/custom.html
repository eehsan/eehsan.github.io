{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"></noscript>

<!-- Support for Font Awesome -->
 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="var(--global-bg-color)"/>

<!-- end custom head snippets -->

<!-- Site palette to mirror eehsan.github.io (Bootstrap-3 inspired) -->
<style>
  /* dark navy/black masthead like navbar-inverse */
  .masthead,
  .masthead__inner-wrap,
  .greedy-nav {
    background-color: #222 !important;
    border-bottom: none !important;
    box-shadow: none !important;
  }
  .greedy-nav .visible-links,
  .greedy-nav .visible-links li,
  .greedy-nav .visible-links a,
  .greedy-nav button,
  .greedy-nav .hidden-links,
  .greedy-nav .hidden-links li {
    background-color: transparent !important;
  }
  .greedy-nav .visible-links a {
    color: #9d9d9d !important;
    font-weight: normal;
  }
  .greedy-nav .visible-links a:hover,
  .greedy-nav .visible-links a:focus {
    color: #fff !important;
  }
  .greedy-nav .visible-links a:before {
    background: #fff !important;
  }
  .greedy-nav .site-title,
  .greedy-nav .site-title:visited {
    color: #fff !important;
    font-weight: normal;
    background-color: transparent !important;
  }
  .greedy-nav .hidden-links {
    background: #222 !important;
  }
  .greedy-nav .hidden-links a {
    color: #9d9d9d !important;
    background-color: transparent !important;
  }
  .greedy-nav .hidden-links a:hover {
    color: #fff !important;
    background: #080808 !important;
  }
  .greedy-nav button {
    color: #fff !important;
  }

  /* Papyrus section headings */
  .page__content h1,
  .page__content h2,
  .page__content h3,
  h2.pub-section {
    font-family: "Papyrus", "Palatino", "Palatino Linotype", serif !important;
    font-weight: normal;
    border-bottom: none;
  }

  /* light gray well-style intro panel on home page */
  body.layout--single .page__content > p:first-of-type,
  body.layout--single .page__content > p:nth-of-type(2) {
    /* keep prose flow; well is applied via wrapper if added */
  }
  .intro-well {
    background-color: #f5f5f5;
    border: 1px solid #e3e3e3;
    border-radius: 4px;
    padding: 19px;
    margin-bottom: 20px;
  }

  /* justified body text */
  .page__content p,
  .page__content li {
    text-align: justify;
    text-justify: inter-word;
  }
</style>
